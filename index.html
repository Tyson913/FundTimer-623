<!--

App Name: Until

Description: Until is a savings timeline calculator for people who know what they want to buy but not how long it'll take.
Enter your target item, its price, and how much you can set aside at a given frequency — daily, weekly, monthly, or yearly — and the app tells you exactly when you'll reach your goal. It also generates a full savings plan with a projected start and end date, so you can commit to a schedule rather than just guess.
No budgeting system. No account sync. Just: here's the thing, here's your rate — here's the date.

-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Until — tell it what you want to buy and what you can set aside, and it tells you exactly when you'll have enough.">
    <title>Until — savings timeline calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header">
        <a href="index.html" class="wordmark">Until</a>
        <a href="manual.html" class="nav-link">Guide</a>
    </header>
    <main>
        <p class="tagline">Tell it what you want and what you can set aside. It tells you the date.</p>

        <form action="" id="ftForm" novalidate>

            <div class="field-section">
                <h2>The purchase</h2>

                <div class="field">
                    <label for="prodName">Item name</label>
                    <input type="text" id="prodName" placeholder="e.g. Wireless headphones" required>
                </div>

                <div class="field-pair">
                    <div class="field">
                        <label for="prodQuan">Quantity</label>
                        <input type="number" id="prodQuan" placeholder="1" required>
                    </div>
                    <div class="field">
                        <label for="prodCurr">Price currency</label>
                        <select id="prodCurr" required>
                            <option value="php">Philippine Peso (PHP - ₱)</option>
                            <option value="usd">US Dollar (USD - $)</option>
                            <option value="eur">Euro (EUR - €)</option>
                            <option value="cny">Chinese Yuan (CNY - CN¥)</option>
                            <option value="jpy">Japanese Yen (JPY - ¥)</option>
                            <option value="gbp">British Pound (GBP - £)</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label for="prodPrice">Unit price</label>
                    <input type="number" id="prodPrice" placeholder="0" required>
                </div>

                <div id="savstartdate" style="display: none;">
                    <div class="field">
                        <label for="targetPurDate">Starting date</label>
                        <input type="date" id="targetPurDate">
                    </div>
                </div>
            </div>

            <div class="field-section">
                <h2>The plan</h2>

                <div class="field-pair">
                    <div class="field">
                        <label for="savFreq">Save</label>
                        <select id="savFreq" required>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="savCurr">Savings currency</label>
                        <select id="savCurr" required>
                            <option value="php">Philippine Peso (PHP - ₱)</option>
                            <option value="usd">US Dollar (USD - $)</option>
                            <option value="eur">Euro (EUR - €)</option>
                            <option value="cny">Chinese Yuan (CNY - CN¥)</option>
                            <option value="jpy">Japanese Yen (JPY - ¥)</option>
                            <option value="gbp">British Pound (GBP - £)</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label for="savAm" id="savamLabel">
                        Amount to save
                        <span id="freqUnit"> · per <span id="sfreqlabel"></span></span>
                    </label>
                    <input type="number" id="savAm" placeholder="0" required>
                </div>
            </div>

            <button type="submit" id="etpButt" class="btn btn-primary">Calculate</button>
        </form>

        <button type="button" id="gensavplanbuttn" class="btn btn-secondary">Generate savings plan</button>

        <div id="resultboxFETCalc" class="res-box" style="display: none;">
            <div class="row">
                <span class="row-label">Item</span>
                <span id="pn" class="row-value"></span>
            </div>
            <div class="row">
                <span class="row-label">Quantity</span>
                <span id="pquan" class="row-value"></span>
            </div>
            <div class="row">
                <span class="row-label">Unit price</span>
                <span id="up" class="row-value"></span>
            </div>
            <div class="row">
                <span class="row-label">Frequency</span>
                <span id="sf" class="row-value"></span>
            </div>
            <div class="row" id="savfreqRes">
                <span id="savfreqLabel" class="row-label"></span>
                <span id="sa" class="row-value"></span>
            </div>

            <div class="stub-divider" aria-hidden="true"></div>

            <div id="FETCalcresLabel" class="hero-row">
                <span class="hero-label">Until you can buy it</span>
                <span id="etp" class="hero-value"></span>
                <span id="extraAm" class="hero-extra"></span>
            </div>
        </div>

        <div id="resultboxSavPlanGen" class="res-box" style="display: none;">
            <div class="row" id="item">
                <span class="row-label">Item</span>
                <span id="pn2" class="row-value"></span>
            </div>

            <div id="detailsCon">
                <div class="details">
                    <div class="row">
                        <span class="row-label">Quantity</span>
                        <span id="pquan2" class="row-value"></span>
                    </div>
                    <div class="row">
                        <span class="row-label">Unit price</span>
                        <span id="up2" class="row-value"></span>
                    </div>
                </div>
                <div class="details" id="detail2">
                    <div class="row">
                        <span class="row-label">Frequency</span>
                        <span id="sf2" class="row-value"></span>
                    </div>
                    <div class="row">
                        <span class="row-label">Amount</span>
                        <span id="sa2" class="row-value"></span>
                    </div>
                </div>
            </div>

            <div class="stub-divider" aria-hidden="true"></div>

            <div id="analysisModelCon">
                <div class="box" id="startingDateCon"></div>
                <svg class="arrow-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h13M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <div class="box" id="endingDateCon"></div>
            </div>

            <p class="summary-label">Summary</p>
            <p id="analText" class="summary-text"></p>
        </div>
    </main>
    <footer>
        <p>Created by: Cj Banluta</p>
        <p>All rights reserved 2026</p>
    </footer>
    <script src="./Backend/operations.js" type="module"></script>
</body>

</html>
